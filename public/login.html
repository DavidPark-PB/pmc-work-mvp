<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMC 로그인</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-box {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 40px;
    width: 360px;
    text-align: center;
  }
  .login-box h1 {
    font-size: 22px;
    margin-bottom: 8px;
    color: #fff;
  }
  .login-box p {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
  }
  .input-group {
    position: relative;
    margin-bottom: 16px;
  }
  .input-group input {
    width: 100%;
    padding: 12px 16px;
    background: #0f0f23;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: #7c4dff;
  }
  .btn-login {
    width: 100%;
    padding: 12px;
    background: #7c4dff;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-login:hover { background: #651fff; }
  .btn-login:disabled { background: #555; cursor: not-allowed; }
  .error-msg {
    color: #ff5252;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-box">
  <h1>PMC Dashboard</h1>
  <p id="modeDesc">아이디와 비밀번호를 입력하세요</p>
  <form id="loginForm" autocomplete="off" spellcheck="false">
    <!-- honeypot: 브라우저 자동채움이 실제 필드 대신 여기 들어가도록 유도 -->
    <div style="position:absolute;left:-9999px;height:0;overflow:hidden;" aria-hidden="true">
      <input type="text" name="fake_user" tabindex="-1" autocomplete="off">
      <input type="password" name="fake_pw" tabindex="-1" autocomplete="new-password">
    </div>

    <div class="input-group" id="usernameGroup">
      <input type="text" id="username" placeholder="아이디" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" readonly>
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="비밀번호" autocomplete="new-password" readonly>
    </div>
    <button type="submit" class="btn-login" id="btnLogin">로그인</button>
  </form>
  <div class="error-msg" id="errorMsg"></div>
  <div style="margin-top:16px;font-size:12px;">
    <a href="#" id="toggleMode" style="color:#888;text-decoration:none;">관리자 전용 로그인 (레거시)</a>
  </div>
  <div style="margin-top:20px;padding:10px 12px;background:#231a00;border:1px solid #3a2a00;border-radius:6px;font-size:11px;color:#d4a02c;line-height:1.5;">
    ⚠️ <strong>여러 직원이 같은 PC를 쓰는 경우</strong>: 크롬이 "비밀번호 저장" 제안을 띄우면 반드시 <strong>"사용 안 함"</strong>을 눌러 주세요. 저장해두면 다른 직원 비번이 덮어써집니다. 기존에 저장된 비번은 <code style="color:#ffc14d;">chrome://settings/passwords</code> 에서 삭제.
  </div>
</div>
<script>
var legacyMode = false;

// ── 자동완성·비번저장 차단 유틸 ──────────────────
(function preventAutofill() {
  var rand = Math.random().toString(36).slice(2, 10);
  var u = document.getElementById('username');
  var p = document.getElementById('password');
  // 예측 불가한 name으로 매번 변경
  u.name = 'u_' + rand;
  p.name = 'p_' + rand;
  // focus/click 시 readonly 제거 (자동채움 스캔 시점엔 readonly라 제외됨)
  var unlock = function(el) {
    el.removeAttribute('readonly');
    el.removeEventListener('focus', onFocusU);
    el.removeEventListener('focus', onFocusP);
    el.removeEventListener('mousedown', onMouseU);
    el.removeEventListener('mousedown', onMouseP);
  };
  var onFocusU = function() { unlock(u); };
  var onFocusP = function() { unlock(p); };
  var onMouseU = function() { unlock(u); };
  var onMouseP = function() { unlock(p); };
  u.addEventListener('focus', onFocusU);
  u.addEventListener('mousedown', onMouseU);
  p.addEventListener('focus', onFocusP);
  p.addEventListener('mousedown', onMouseP);
  // 초기 포커스(autofocus)는 자동채움을 유발하므로 약간 지연 + readonly가 풀린 뒤 포커스
  setTimeout(function() { unlock(u); u.focus(); }, 250);
})();

document.getElementById('toggleMode').addEventListener('click', function(e) {
  e.preventDefault();
  legacyMode = !legacyMode;
  var ug = document.getElementById('usernameGroup');
  var desc = document.getElementById('modeDesc');
  var toggle = document.getElementById('toggleMode');
  var unameInput = document.getElementById('username');
  var pwInput = document.getElementById('password');
  if (legacyMode) {
    ug.style.display = 'none';
    unameInput.value = '';
    desc.textContent = '관리자 비밀번호를 입력하세요';
    toggle.textContent = '← 아이디로 로그인';
    pwInput.focus();
  } else {
    ug.style.display = '';
    desc.textContent = '아이디와 비밀번호를 입력하세요';
    toggle.textContent = '관리자 전용 로그인 (레거시)';
    unameInput.focus();
  }
});

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('btnLogin');
  var errEl = document.getElementById('errorMsg');
  var username = document.getElementById('username').value.trim();
  var pw = document.getElementById('password').value;
  if (!pw) return;
  if (!legacyMode && !username) {
    errEl.textContent = '아이디를 입력하세요';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '확인 중...';
  errEl.style.display = 'none';

  try {
    var payload = legacyMode ? { password: pw } : { username: username, password: pw };
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    var data = await res.json();
    if (res.ok && data.success) {
      // 필드 비워서 브라우저 "비번 저장" 제안 트리거 최소화 + history 안 남기게 replace
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      window.location.replace('/');
      return;
    } else {
      errEl.textContent = data.error || '로그인에 실패했습니다';
      errEl.style.display = 'block';
    }
  } catch (err) {
    errEl.textContent = '서버 연결 실패';
    errEl.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = '로그인';
});
</script>
</body>
</html>
